<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1>Temperature Converter</h1>
        <div class="converter">
            <div class="celsius degree">
            <p>Celsius:</p>
            <input type="number" class="input C">
        </div>
        <div class="fahrenheit degree">
            <p>Fahrenheit:</p>
            <input type="number" class="input F">
        </div>
        <div class="kelvin degree">
            <p>Kelvin:</p>
            <input type="number" class="input K">
        </div>
        </div>
    </div>
    <script src="script.js" ></script>
</body>
</html>
